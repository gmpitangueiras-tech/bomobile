<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#003F87" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="description"
      content="Sistema de Registro de Ocorrências da Guarda Municipal de Pitangueiras - PR"
    />

    <title>Guarda Municipal - Pitangueiras/PR</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/cores-pitangueiras.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/components.css" />

    <!-- Manifest PWA -->
    <link rel="manifest" href="manifest.json" />

    <!-- Favicon -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="assets/icons/icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="assets/icons/icon-512x512.png"
    />
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />
  </head>
  <body>
    <div id="app">
      <!-- Container principal -->
      <div class="container" id="main-container">
        <!-- Tela de Login será carregada aqui -->
        <div id="page-content">
          <!-- O conteúdo será injetado pelo JavaScript -->
          <div
            style="
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              min-height: 100vh;
              padding: 20px;
              text-align: center;
            "
          >
            <div
              class="spinner"
              style="
                width: 40px;
                height: 40px;
                border-width: 4px;
                border-color: var(--azul-bandeira);
                margin: 0 auto;
              "
            ></div>
            <p style="margin-top: 16px; color: var(--cinza-escuro)">
              Carregando sistema...
            </p>
            <p
              style="
                margin-top: 8px;
                color: var(--cinza-medio);
                font-size: 14px;
              "
            >
              Guarda Municipal de Pitangueiras - PR
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- ============================================ -->
    <!-- BIBLIOTECAS E SCRIPTS - ORDEM CORRETA         -->
    <!-- ============================================ -->

    <!-- 1. Supabase JS (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- 2. Configurações do Sistema -->
    <script src="js/config.js"></script>

    <!-- 3. Cliente Supabase -->
    <script src="js/supabase-client.js"></script>

    <!-- 4. Gerenciador de Autenticação -->
    <script src="js/auth.js"></script>

    <!-- 5. Gerenciador de Banco de Dados Local (IndexedDB) -->
    <script src="js/db.js"></script>

    <!-- 6. Gerenciador de Sincronização -->
    <script src="js/sync.js"></script>

    <!-- 7. Gerenciador de Ocorrências -->
    <script src="js/ocorrencia.js"></script>

    <!-- 8. Aplicação Principal -->
    <script src="js/app.js"></script>

    <!-- 9. Service Worker Registration e Inicialização -->
    <script>
      // ============================================
      // INICIALIZAÇÃO MANUAL
      // ============================================

      // Função para verificar se todos os scripts carregaram
      function verificarDependencias() {
        const dependencias = {
          CONFIG: typeof CONFIG !== "undefined",
          supabaseClient: typeof supabaseClient !== "undefined",
          authManager: typeof authManager !== "undefined",
          app: typeof app !== "undefined",
        };

        let todosOk = true;
        console.log("📦 Verificando dependências:");
        for (const [nome, ok] of Object.entries(dependencias)) {
          console.log(`  ${ok ? "✅" : "❌"} ${nome}`);
          if (!ok) todosOk = false;
        }

        return todosOk;
      }

      // Inicialização principal
      function iniciarSistema() {
        console.log("🚀 Iniciando sistema...");

        // Verifica dependências
        if (!verificarDependencias()) {
          console.warn(
            "⚠️ Algumas dependências estão faltando. Tentando carregar novamente...",
          );
          setTimeout(iniciarSistema, 1000);
          return;
        }

        // Inicializa a aplicação
        if (typeof app !== "undefined" && app.init) {
          console.log("📱 Iniciando aplicação...");
          app.init().catch(function (error) {
            console.error("❌ Erro ao iniciar aplicação:", error);
            mostrarErroInicializacao(
              "Erro ao iniciar o sistema. Verifique sua conexão.",
            );
          });
        } else {
          console.error("❌ Aplicação não encontrada");
          mostrarErroInicializacao(
            "Aplicação não encontrada. Recarregue a página.",
          );
        }
      }

      // Mostra erro de inicialização
      function mostrarErroInicializacao(mensagem) {
        const container = document.getElementById("page-content");
        if (!container) return;

        container.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center;">
                    <div style="font-size:64px;margin-bottom:20px;">⚠️</div>
                    <h2 style="color:var(--azul-bandeira);">Erro ao Iniciar</h2>
                    <p style="color:var(--cinza-escuro);margin-bottom:8px;">${mensagem}</p>
                    <p style="color:var(--cinza-medio);font-size:14px;margin-bottom:20px;">
                        Tente recarregar a página ou verifique sua conexão com a internet.
                    </p>
                    <button onclick="location.reload()" class="btn-primario" style="max-width:200px;">
                        🔄 Recarregar Página
                    </button>
                    <div style="margin-top:20px;font-size:12px;color:var(--cinza-medio);">
                        Guarda Municipal de ${typeof CONFIG !== "undefined" ? CONFIG.MUNICIPIO : "Pitangueiras"} - ${typeof CONFIG !== "undefined" ? CONFIG.ESTADO : "PR"}
                        <br>
                        v${typeof CONFIG !== "undefined" ? CONFIG.VERSAO : "1.0.0"}
                    </div>
                </div>
            `;
      }

      // ============================================
      // EVENTOS DE INICIALIZAÇÃO
      // ============================================

      // Quando o DOM estiver pronto
      document.addEventListener("DOMContentLoaded", function () {
        console.log("📄 DOM carregado e pronto");

        // Aguarda um pequeno delay para garantir que todos os scripts foram carregados
        setTimeout(function () {
          iniciarSistema();
        }, 300);
      });

      // Se o DOM já estiver carregado, inicia imediatamente
      if (
        document.readyState === "complete" ||
        document.readyState === "interactive"
      ) {
        console.log("📄 DOM já estava carregado");
        setTimeout(function () {
          iniciarSistema();
        }, 100);
      }

      // ============================================
      // SERVICE WORKER
      // ============================================

      // Registro do Service Worker para PWA
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then(function (registration) {
              console.log(
                "✅ Service Worker registrado com sucesso:",
                registration.scope,
              );

              // Verifica atualizações
              registration.addEventListener("updatefound", function () {
                const newWorker = registration.installing;
                console.log("🔄 Nova versão do Service Worker encontrada");

                newWorker.addEventListener("statechange", function () {
                  if (newWorker.state === "installed") {
                    console.log("✅ Service Worker atualizado");
                    // Notifica o usuário se estiver logado
                    if (
                      typeof authManager !== "undefined" &&
                      authManager.isLoggedIn()
                    ) {
                      authManager.mostrarToast(
                        "Nova versão disponível. Atualize a página.",
                        "info",
                      );
                    }
                  }
                });
              });
            })
            .catch(function (error) {
              console.warn("⚠️ Falha ao registrar Service Worker:", error);
            });
        });
      } else {
        console.warn("⚠️ Service Worker não suportado neste navegador");
      }

      // ============================================
      // MONITORAMENTO DE CONEXÃO
      // ============================================

      // Evento quando fica online
      window.addEventListener("online", function () {
        console.log("🟢 Conexão restaurada");

        // Atualiza status visual
        const statusElements = document.querySelectorAll(".status-conexao");
        statusElements.forEach(function (el) {
          el.className = "status-conexao online";
          const ponto = el.querySelector(".ponto");
          const texto = el.querySelector(".texto");
          if (ponto) ponto.style.background = "var(--verde-bandeira)";
          if (texto) texto.textContent = "Online";
        });

        // Tenta sincronizar automaticamente
        if (
          typeof syncManager !== "undefined" &&
          syncManager.sincronizarAutomaticamente
        ) {
          console.log("🔄 Iniciando sincronização automática...");
          syncManager.sincronizarAutomaticamente();
        }

        // Notifica o usuário
        if (typeof authManager !== "undefined" && authManager.isLoggedIn()) {
          authManager.mostrarToast(
            "Conexão restaurada. Sincronizando dados...",
            "success",
          );
        }
      });

      // Evento quando fica offline
      window.addEventListener("offline", function () {
        console.log("🔴 Conexão perdida - Modo offline");

        // Atualiza status visual
        const statusElements = document.querySelectorAll(".status-conexao");
        statusElements.forEach(function (el) {
          el.className = "status-conexao offline";
          const ponto = el.querySelector(".ponto");
          const texto = el.querySelector(".texto");
          if (ponto) ponto.style.background = "#E65100";
          if (texto) texto.textContent = "Offline";
        });

        // Notifica o usuário
        if (typeof authManager !== "undefined" && authManager.isLoggedIn()) {
          authManager.mostrarToast(
            "Modo offline ativado. Os dados serão salvos localmente.",
            "warning",
          );
        }
      });

      // ============================================
      // PREVENÇÃO DE ZOOM EM DISPOSITIVOS MÓVEIS
      // ============================================

      // Previne zoom com dois toques
      document.addEventListener(
        "dblclick",
        function (e) {
          e.preventDefault();
        },
        { passive: false },
      );

      // Previne gestos de pinça
      document.addEventListener(
        "gesturestart",
        function (e) {
          e.preventDefault();
        },
        { passive: false },
      );

      // ============================================
      // LOG INICIAL DO SISTEMA
      // ============================================

      console.log("========================================");
      console.log("🛡️ GUARDA MUNICIPAL DE PITANGUEIRAS - PR");
      console.log("📱 Sistema de Registro de Ocorrências");
      console.log("📌 Versão: 1.0.0");
      console.log("========================================");
      console.log(
        "📅 " +
          new Date().toLocaleDateString("pt-BR", {
            day: "2-digit",
            month: "2-digit",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
          }),
      );
      console.log("🌐 Navegador:", navigator.userAgent);
      console.log("📱 Dispositivo:", screen.width + "x" + screen.height);
      console.log("========================================");
      console.log("⏳ Aguardando inicialização...");
      console.log("========================================");
    </script>
  </body>
</html>
