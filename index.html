<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#003F87" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="description"
      content="Sistema de Registro de Ocorrências da Guarda Municipal de Pitangueiras - PR"
    />

    <title>Guarda Municipal - Pitangueiras/PR</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- ===== LEAFLET - MAPA ===== -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <!-- Manifest PWA -->
    <link rel="manifest" href="manifest.json" />

    <!-- Ícones -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="assets/icons/icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="assets/icons/icon-512x512.png"
    />
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />

    <!-- Font Awesome para ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="app">
      <!-- ========== HEADER ========== -->
      <header id="app-header" style="display: none">
        <div class="header-content">
          <div class="logo-area">
            <!-- Botão menu removido -->
            <div
              style="
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.2);
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <i
                class="fas fa-shield-alt"
                style="font-size: 18px; color: var(--branco)"
              ></i>
            </div>
            <div class="logo-text">
              <span class="title">Guarda Municipal</span>
              <span class="subtitle">Pitangueiras - PR</span>
            </div>
          </div>
          <div class="user-info">
            <div class="user-details">
              <span class="name" id="userName">Carregando...</span>
              <span class="matricula" id="userMatricula"></span>
            </div>
            <div class="avatar" id="userAvatar">
              <i class="fas fa-user"></i>
            </div>
          </div>
        </div>
      </header>

      <!-- ========== CONTEÚDO PRINCIPAL ========== -->
      <main id="main-content">
        <!-- Login Screen -->
        <div id="page-login" class="page">
          <div class="login-screen">
            <div class="login-card">
              <div class="logo-container">
                <div class="logo-wrapper">
                  <div
                    style="
                      width: 80px;
                      height: 80px;
                      border-radius: 50%;
                      background: var(--gradiente-principal);
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      margin: 0 auto;
                    "
                  >
                    <i
                      class="fas fa-shield-alt"
                      style="font-size: 40px; color: var(--branco)"
                    ></i>
                  </div>
                  <div class="logo-ring"></div>
                </div>
                <h1>Guarda Municipal</h1>
                <h2>Pitangueiras - PR</h2>
                <p class="subtitle">
                  <i
                    class="fas fa-clipboard-list"
                    style="margin-right: 6px"
                  ></i>
                  Sistema de Registro de Ocorrências
                </p>
              </div>

              <form id="loginForm">
                <div class="form-group">
                  <label for="loginCpf">
                    <i
                      class="fas fa-id-card"
                      style="margin-right: 6px; color: var(--azul-bandeira)"
                    ></i>
                    CPF
                  </label>
                  <div class="input-wrapper">
                    <i class="fas fa-user input-icon-left"></i>
                    <input
                      type="text"
                      id="loginCpf"
                      placeholder="123.456.789-00"
                      maxlength="14"
                      autocomplete="username"
                    />
                  </div>
                </div>
                <div class="form-group">
                  <label for="loginSenha">
                    <i
                      class="fas fa-lock"
                      style="margin-right: 6px; color: var(--azul-bandeira)"
                    ></i>
                    Senha
                  </label>
                  <div class="input-wrapper">
                    <i class="fas fa-lock input-icon-left"></i>
                    <input
                      type="password"
                      id="loginSenha"
                      placeholder="Digite sua senha"
                      autocomplete="current-password"
                    />
                    <button
                      type="button"
                      class="toggle-password"
                      aria-label="Mostrar senha"
                    >
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>

                <div class="options-row">
                  <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe" />
                    <span>Lembrar-me</span>
                  </label>
                  <a href="#" class="forgot-link">
                    <i
                      class="fas fa-question-circle"
                      style="margin-right: 4px"
                    ></i>
                    Esqueci minha senha
                  </a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                  <i class="fas fa-sign-in-alt" style="margin-right: 8px"></i>
                  <span class="btn-text">ENTRAR</span>
                  <span class="spinner-small"></span>
                </button>

                <div
                  id="loginError"
                  class="login-error"
                  style="display: none"
                ></div>
              </form>

              <div class="login-footer">
                <span class="version">
                  <i
                    class="fas fa-code"
                    style="margin-right: 4px; font-size: 11px"
                  ></i>
                  v1.0.0
                </span>
                <span class="separator">•</span>
                <span>
                  <i
                    class="fas fa-building"
                    style="margin-right: 4px; font-size: 11px"
                  ></i>
                  Guarda Municipal de Pitangueiras
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Dashboard -->
        <div id="page-dashboard" class="page" style="display: none">
          <div class="container" id="dashboardContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Consulta Operacional -->
        <div id="page-consulta" class="page" style="display: none">
          <div class="container" id="consultaContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Mural de Avisos -->
        <div id="page-mural" class="page" style="display: none">
          <div class="container" id="muralContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Ocorrências -->
        <div id="page-ocorrencias" class="page" style="display: none">
          <div class="container" id="ocorrenciasContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Nova Ocorrência -->
        <div id="page-nova-ocorrencia" class="page" style="display: none">
          <div class="container" id="novaOcorrenciaContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Detalhe da Ocorrência -->
        <div id="page-detalhe-ocorrencia" class="page" style="display: none">
          <div class="container" id="detalheOcorrenciaContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Retificações Pendentes -->
        <div id="page-retificacoes" class="page" style="display: none">
          <div class="container" id="retificacoesContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Relatórios -->
        <div id="page-relatorios" class="page" style="display: none">
          <div class="container" id="relatoriosContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Logs do Sistema -->
        <div id="page-logs" class="page" style="display: none">
          <div class="container" id="logsContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Usuários -->
        <div id="page-usuarios" class="page" style="display: none">
          <div class="container" id="usuariosContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Perfil -->
        <div id="page-perfil" class="page" style="display: none">
          <div class="container" id="perfilContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>
      </main>

      <!-- ========== BOTTOM NAVIGATION (sempre visível, exceto login) ========== -->
      <nav id="bottom-nav" class="bottom-nav" style="display: none">
        <!-- Início -->
        <button class="nav-item active" data-page="dashboard">
          <i class="fas fa-th-large"></i>
          <span>Início</span>
        </button>

        <!-- Mural -->
        <button class="nav-item" data-page="mural">
          <div class="icon-wrapper">
            <i class="fas fa-bullhorn"></i>
            <span id="badge-mural" class="badge-count" style="display: none"
              >0</span
            >
          </div>
          <span>Mural</span>
        </button>

        <!-- Novo BO (central com destaque) -->
        <button class="nav-item" data-page="nova-ocorrencia">
          <div class="nav-fab">
            <i class="fas fa-plus"></i>
          </div>
          <span>Novo BO</span>
        </button>

        <!-- Minhas Ocorrências -->
        <button class="nav-item" data-page="ocorrencias">
          <i class="fas fa-list-ul"></i>
          <span>Ocorrências</span>
        </button>

        <!-- Mais (abre bottom sheet) -->
        <button class="nav-item" id="navMais">
          <i class="fas fa-ellipsis-h"></i>
          <span>Mais</span>
        </button>
      </nav>

      <!-- ========== BOTTOM SHEET (painel "Mais") ========== -->
      <div
        id="bottomSheetOverlay"
        class="bottom-sheet-overlay"
        style="display: none"
      >
        <div id="bottomSheet" class="bottom-sheet">
          <div class="bottom-sheet-handle"></div>
          <div class="bottom-sheet-items">
            <!-- Itens serão inseridos dinamicamente pelo JavaScript -->
          </div>
        </div>
      </div>

      <!-- ========== TOAST - Notificações ========== -->
      <div id="toastContainer"></div>
    </div>

    <!-- ========== SCRIPTS ========== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ocorrencia.js"></script>
    <script src="js/session.js"></script>
    <script src="js/app.js"></script>
    <!-- Bibliotecas para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  </body>
</html>
