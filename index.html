<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#003F87" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta
      name="description"
      content="Sistema de Registro de Ocorrências da Guarda Municipal de Pitangueiras - PR"
    />

    <title>Guarda Municipal - Pitangueiras/PR</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css" />

    <!-- Manifest PWA -->
    <link rel="manifest" href="manifest.json" />

    <!-- Ícones -->
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="assets/icons/icon-192x192.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="512x512"
      href="assets/icons/icon-512x512.png"
    />
    <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png" />

    <!-- Font Awesome para ícones -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <div id="app">
      <!-- ========== HEADER ========== -->
      <header id="app-header" style="display: none">
        <div class="header-content">
          <div class="logo-area">
            <button id="menuToggle" class="menu-btn" aria-label="Abrir menu">
              <i class="fas fa-bars"></i>
            </button>
            <div
              style="
                width: 36px;
                height: 36px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.2);
                display: flex;
                align-items: center;
                justify-content: center;
              "
            >
              <i
                class="fas fa-shield-alt"
                style="font-size: 18px; color: var(--branco)"
              ></i>
            </div>
            <div class="logo-text">
              <span class="title">Guarda Municipal</span>
              <span class="subtitle">Pitangueiras - PR</span>
            </div>
          </div>
          <div class="user-info">
            <div class="user-details">
              <span class="name" id="userName">Carregando...</span>
              <span class="matricula" id="userMatricula"></span>
            </div>
            <div class="avatar" id="userAvatar">
              <i class="fas fa-user"></i>
            </div>
          </div>
        </div>
      </header>

      <!-- ========== MENU LATERAL ========== -->
      <div id="menuOverlay" class="menu-overlay"></div>
      <nav id="sideMenu" class="side-menu">
        <div class="menu-header">
          <div class="avatar" id="menuAvatar">
            <i class="fas fa-user" style="font-size: 28px"></i>
          </div>
          <div class="nome" id="menuNome">Carregando...</div>
          <div class="matricula" id="menuMatricula"></div>
          <div class="perfil-badge" id="menuPerfil">Guarda</div>
        </div>
        <div class="menu-items">
          <button class="menu-item active" data-page="dashboard">
            <i class="fas fa-home"></i>
            <span>Início</span>
          </button>
          <button class="menu-item" data-page="ocorrencias">
            <i class="fas fa-list"></i>
            <span>Minhas Ocorrências</span>
          </button>
          <button class="menu-item" data-page="nova-ocorrencia">
            <i class="fas fa-plus-circle"></i>
            <span>Nova Ocorrência</span>
          </button>
          <button
            class="menu-item"
            data-page="relatorios"
            id="menuRelatorios"
            style="display: none"
          >
            <i class="fas fa-chart-bar"></i>
            <span>Relatórios</span>
          </button>
          <button
            class="menu-item"
            data-page="usuarios"
            id="menuUsuarios"
            style="display: none"
          >
            <i class="fas fa-users"></i>
            <span>Gerenciar Usuários</span>
          </button>
          <div class="menu-divider"></div>
          <button class="menu-item" data-page="perfil">
            <i class="fas fa-user"></i>
            <span>Meu Perfil</span>
          </button>
          <button class="menu-item" id="btnLogout">
            <i class="fas fa-sign-out-alt"></i>
            <span>Sair</span>
          </button>
        </div>
        <div class="menu-footer">
          <span>
            <i class="fas fa-code" style="margin-right: 4px"></i>
            v1.0.0
          </span>
          <span class="separator">•</span>
          <span>
            <i class="fas fa-building" style="margin-right: 4px"></i>
            Pitangueiras - PR
          </span>
        </div>
      </nav>

      <!-- ========== CONTEÚDO PRINCIPAL ========== -->
      <main id="main-content">
        <!-- Login Screen -->
        <div id="page-login" class="page">
          <div class="login-screen">
            <div class="login-card">
              <div class="logo-container">
                <div class="logo-wrapper">
                  <div
                    style="
                      width: 80px;
                      height: 80px;
                      border-radius: 50%;
                      background: var(--gradiente-principal);
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      margin: 0 auto;
                    "
                  >
                    <i
                      class="fas fa-shield-alt"
                      style="font-size: 40px; color: var(--branco)"
                    ></i>
                  </div>
                  <div class="logo-ring"></div>
                </div>
                <h1>Guarda Municipal</h1>
                <h2>Pitangueiras - PR</h2>
                <p class="subtitle">
                  <i
                    class="fas fa-clipboard-list"
                    style="margin-right: 6px"
                  ></i>
                  Sistema de Registro de Ocorrências
                </p>
              </div>

              <form id="loginForm">
                <div class="form-group">
                  <label for="loginCpf">
                    <i
                      class="fas fa-id-card"
                      style="margin-right: 6px; color: var(--azul-bandeira)"
                    ></i>
                    CPF
                  </label>
                  <div class="input-wrapper">
                    <i class="fas fa-user input-icon-left"></i>
                    <input
                      type="text"
                      id="loginCpf"
                      placeholder="123.456.789-00"
                      maxlength="14"
                      autocomplete="username"
                    />
                  </div>
                </div>
                <div class="form-group">
                  <label for="loginSenha">
                    <i
                      class="fas fa-lock"
                      style="margin-right: 6px; color: var(--azul-bandeira)"
                    ></i>
                    Senha
                  </label>
                  <div class="input-wrapper">
                    <i class="fas fa-lock input-icon-left"></i>
                    <input
                      type="password"
                      id="loginSenha"
                      placeholder="Digite sua senha"
                      autocomplete="current-password"
                    />
                    <button
                      type="button"
                      class="toggle-password"
                      aria-label="Mostrar senha"
                    >
                      <i class="fas fa-eye"></i>
                    </button>
                  </div>
                </div>

                <div class="options-row">
                  <label class="checkbox-container">
                    <input type="checkbox" id="rememberMe" />
                    <span>Lembrar-me</span>
                  </label>
                  <a href="#" class="forgot-link">
                    <i
                      class="fas fa-question-circle"
                      style="margin-right: 4px"
                    ></i>
                    Esqueci minha senha
                  </a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                  <i class="fas fa-sign-in-alt" style="margin-right: 8px"></i>
                  <span class="btn-text">ENTRAR</span>
                  <span class="spinner-small"></span>
                </button>

                <div
                  id="loginError"
                  class="login-error"
                  style="display: none"
                ></div>
              </form>

              <div class="login-footer">
                <span class="version">
                  <i
                    class="fas fa-code"
                    style="margin-right: 4px; font-size: 11px"
                  ></i>
                  v1.0.0
                </span>
                <span class="separator">•</span>
                <span>
                  <i
                    class="fas fa-building"
                    style="margin-right: 4px; font-size: 11px"
                  ></i>
                  Guarda Municipal de Pitangueiras
                </span>
              </div>
            </div>
          </div>
        </div>

        <!-- Dashboard -->
        <div id="page-dashboard" class="page" style="display: none">
          <div class="container" id="dashboardContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Ocorrências -->
        <div id="page-ocorrencias" class="page" style="display: none">
          <div class="container" id="ocorrenciasContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Nova Ocorrência -->
        <div id="page-nova-ocorrencia" class="page" style="display: none">
          <div class="container" id="novaOcorrenciaContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Detalhe da Ocorrência -->
        <div id="page-detalhe-ocorrencia" class="page" style="display: none">
          <div class="container" id="detalheOcorrenciaContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Relatórios -->
        <div id="page-relatorios" class="page" style="display: none">
          <div class="container" id="relatoriosContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Usuários -->
        <div id="page-usuarios" class="page" style="display: none">
          <div class="container" id="usuariosContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>

        <!-- Perfil -->
        <div id="page-perfil" class="page" style="display: none">
          <div class="container" id="perfilContent">
            <!-- Carregado via JavaScript -->
          </div>
        </div>
      </main>

      <!-- ========== FAB - Botão Flutuante ========== -->
      <button id="fab" class="fab" style="display: none">
        <i class="fas fa-plus"></i>
        <span class="fab-label">Nova Ocorrência</span>
      </button>

      <!-- ========== TOAST - Notificações ========== -->
      <div id="toastContainer"></div>
    </div>

    <!-- ========== SCRIPTS ========== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ocorrencia.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
