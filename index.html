    <!-- ============================================
    PWA - SERVICE WORKER REGISTRATION
    ============================================ -->
    <script>
      // Registrar Service Worker para PWA e Notificações
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker
            .register("sw.js")
            .then(function (registration) {
              console.log("✅ Service Worker registrado com sucesso");

              // Verificar se há suporte para notificações push
              if (
                "Notification" in window &&
                Notification.permission === "granted"
              ) {
                // Solicitar permissão para notificações após registro
                console.log("🔔 Notificações já permitidas");
              }

              // Verificar suporte a Background Sync
              if ("sync" in registration) {
                console.log("🔄 Background Sync suportado");
              }

              // Verificar suporte a Periodic Sync
              if ("periodicSync" in registration) {
                console.log("🔄 Periodic Sync suportado");
              }
            })
            .catch(function (error) {
              console.warn("⚠️ Erro ao registrar Service Worker:", error);
            });
        });
      } else {
        console.log("ℹ️ Service Worker não suportado neste navegador");
      }

      // Solicitar permissão para notificações push
      function requestNotificationPermission() {
        if (!("Notification" in window)) {
          console.log("ℹ️ Notificações não suportadas");
          return;
        }

        if (Notification.permission === "granted") {
          console.log("🔔 Notificações já permitidas");
          return;
        }

        if (Notification.permission === "denied") {
          console.log("🔔 Notificações bloqueadas pelo usuário");
          return;
        }

        // Solicitar permissão após interação do usuário
        document.addEventListener(
          "click",
          function requestPermission() {
            Notification.requestPermission().then(function (permission) {
              console.log("🔔 Permissão de notificações:", permission);
              if (permission === "granted") {
                // Registrar para receber notificações push
                console.log("✅ Notificações push ativadas");
              }
            });
            document.removeEventListener("click", requestPermission);
          },
          { once: true },
        );
      }

      // Solicitar permissão quando a página carregar (após um pequeno delay)
      setTimeout(requestNotificationPermission, 3000);
    </script>

    <!-- ============================================
    INICIALIZAÇÃO ADICIONAL
    ============================================ -->
    <script>
      // Detectar se é um dispositivo móvel para otimizações
      const isMobile =
        /Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile/i.test(
          navigator.userAgent,
        );
      if (isMobile) {
        document.documentElement.classList.add("is-mobile");
        console.log("📱 Dispositivo móvel detectado");
      }

      // Prevenir zoom duplo toque em dispositivos móveis
      document.addEventListener(
        "dblclick",
        function (e) {
          if (isMobile) {
            e.preventDefault();
          }
        },
        { passive: false },
      );

      // Registrar interação do usuário para habilitar notificações
      document.addEventListener(
        "click",
        function enableNotifications() {
          if (
            "Notification" in window &&
            Notification.permission === "default"
          ) {
            Notification.requestPermission().then(function (permission) {
              console.log("🔔 Permissão de notificações:", permission);
            });
          }
          document.removeEventListener("click", enableNotifications);
        },
        { once: true },
      );

      // 🔥 NOVO: Inicializar badge de notificações via UI
      document.addEventListener("DOMContentLoaded", function () {
        // Aguardar o carregamento do módulo UI
        setTimeout(function () {
          if (
            typeof window.ui !== "undefined" &&
            window.ui.atualizarBadgeNotificacoes
          ) {
            window.ui.atualizarBadgeNotificacoes();
            console.log("🔔 Badge de notificações inicializado");
          }
        }, 2000);
      });

      console.log(`📱 Modo: ${isMobile ? "Mobile" : "Desktop"}`);
      console.log(`🌐 Navegador: ${navigator.userAgent.split(" ").pop()}`);
    </script>
